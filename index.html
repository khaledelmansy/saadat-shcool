<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة نتائج مدرسة السادات العسكرية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { military: { 800: '#1e293b', 900: '#0f172a', 950: '#020617' }, gold: { 500: '#eab308' } } } }
        }
    </script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <!-- قسم الاستعلام -->
    <main class="flex-grow">
        <section id="search-section" class="py-12 px-4">
            <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-lg border-t-4 border-gold-500">
                <h2 class="text-2xl font-bold text-military-900 mb-6 text-center">استعلام عن النتيجة</h2>
                <form id="searchForm" onsubmit="handleSearch(event)" class="space-y-4">
                    <input type="text" id="nationalIdInput" placeholder="أدخل الرقم القومي (14 رقماً)" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-gold-500 outline-none" required>
                    <button type="submit" class="w-full bg-military-800 text-white font-bold py-4 rounded-xl hover:bg-military-900 transition">بحث عن النتيجة</button>
                </form>
            </div>
        </section>

        <!-- منطقة عرض النتيجة -->
        <div id="result-display-area" class="hidden py-8 px-4">
            <div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-gray-200">
                <h3 class="text-xl font-bold mb-4">بيان درجات الطالب: <span id="cert-student-name"></span></h3>
                <table class="w-full border-collapse border border-gray-200 text-center mb-6">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="border p-2">المادة</th>
                            <th class="border p-2">الدرجة</th>
                        </tr>
                    </thead>
                    <tbody id="cert-grades-table-body"></tbody>
                </table>
            </div>
        </div>

        <!-- لوحة تحكم الأدمن -->
        <section class="py-12 bg-military-900 text-white">
            <div class="container mx-auto px-4 text-center">
                <h3 class="text-xl font-bold mb-6">لوحة تحكم المسؤول</h3>
                <input type="file" id="excelFileInput" accept=".xlsx" class="hidden" onchange="handleExcelUpload(event)">
                <label for="excelFileInput" class="bg-emerald-600 px-6 py-3 rounded-lg cursor-pointer">
                    رفع ملف "نتيجة مدرسة السادات العسكرية بنين.xlsx"
                </label>
            </div>
        </section>
    </main>

    <script>
        let studentsDatabase = {};

        // دالة قراءة الملف المحدثة والمتوافقة مع "نتيجة مدرسة السادات العسكرية بنين.xlsx"
        function handleExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    workbook.SheetNames.forEach(sheetName => {
                        const worksheet = workbook.Sheets[sheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet);

                        jsonData.forEach(row => {
                            const nationalId = String(row['الرقم القومي'] || '').trim();
                            if (!nationalId) return;

                            let gradesArray = [];
                            Object.keys(row).forEach(key => {
                                if (key !== 'الرقم القومي' && key !== 'اسم الطالب' && !key.includes('المجموع')) {
                                    const parts = key.split(/[\/\n]/);
                                    const subjectName = parts[0].trim();
                                    const maxScore = parseInt(parts[1]) || 100;

                                    gradesArray.push({
                                        name: subjectName,
                                        max: maxScore,
                                        score: Number(row[key]) || 0
                                    });
                                }
                            });

                            studentsDatabase[nationalId] = {
                                name: String(row['اسم الطالب'] || 'طالب').trim(),
                                grade: "الصف " + sheetName,
                                grades: gradesArray
                            };
                        });
                    });
                    alert("تم تحميل البيانات من نتيجة مدرسة السادات العسكرية بنين.xlsx بنجاح");
                } catch (error) {
                    alert("حدث خطأ في قراءة ملف نتيجة مدرسة السادات العسكرية بنين.xlsx");
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function handleSearch(event) {
            event.preventDefault();
            const id = document.getElementById('nationalIdInput').value.trim();
            const student = studentsDatabase[id];
            
            if (!student) {
                alert("الرقم غير موجود");
                return;
            }

            document.getElementById('cert-student-name').innerText = student.name;
            const tableBody = document.getElementById('cert-grades-table-body');
            tableBody.innerHTML = '';
            
            student.grades.forEach(item => {
                tableBody.innerHTML += `<tr><td class="border p-2">${item.name}</td><td class="border p-2">${item.score}</td></tr>`;
            });

            document.getElementById('result-display-area').classList.remove('hidden');
        }
    </script>
</body>
</html>
